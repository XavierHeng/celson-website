name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Build French version (shop-fr.html)
        run: node build-fr.js

      - name: Build deploy-tmp
        run: |
          rm -rf deploy-tmp
          mkdir -p deploy-tmp/css deploy-tmp/js deploy-tmp/assets/shop deploy-tmp/functions
          cp *.html deploy-tmp/
          cp robots.txt deploy-tmp/ 2>/dev/null || true
          cp sitemap.xml deploy-tmp/ 2>/dev/null || true
          cp _headers deploy-tmp/ 2>/dev/null || true
          cp css/style.css deploy-tmp/css/
          cp js/*.js deploy-tmp/js/
          cp assets/*.webp deploy-tmp/assets/
          cp assets/shop/*.webp deploy-tmp/assets/shop/
          cp functions/*.js deploy-tmp/functions/
          echo "Deploy-tmp built with $(find deploy-tmp -type f | wc -l) files"

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy deploy-tmp --project-name=celson-website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
