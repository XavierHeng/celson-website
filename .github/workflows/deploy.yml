name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Build French version (shop-fr.html)
        run: node build-fr.js

      - name: Build deploy-tmp
        run: |
          rm -rf deploy-tmp
          mkdir -p deploy-tmp/css deploy-tmp/js
          cp *.html deploy-tmp/
          cp robots.txt deploy-tmp/ 2>/dev/null || true
          cp sitemap.xml deploy-tmp/ 2>/dev/null || true
          cp _headers deploy-tmp/ 2>/dev/null || true
          cp css/style.css deploy-tmp/css/
          cp js/*.js deploy-tmp/js/
          cp -r assets deploy-tmp/
          rm -rf deploy-tmp/assets/_archive
          echo "Deploy-tmp built with $(find deploy-tmp -type f | wc -l) files"

      - name: Cache-bust CSS/JS in HTML
        run: |
          export VERSION=$(date +%s)
          python3 -c "
          import os, re, glob
          version = os.environ['VERSION']
          for f in glob.glob('deploy-tmp/*.html'):
              with open(f, 'r', encoding='utf-8') as fp:
                  content = fp.read()
              # CSS: href=\"css/style.css\" → href=\"css/style.css?v=TIMESTAMP\"
              content = re.sub(r'(href=[\"\\x27]css/style\\.css)([\"\\x27])', rf'\\1?v={version}\\2', content)
              # JS: src=\"js/xxx.js\" → src=\"js/xxx.js?v=TIMESTAMP\"
              content = re.sub(r'(src=[\"\\x27]js/([^\"\\x27]+\\.js))([\"\\x27])', rf'\\1?v={version}\\3', content)
              with open(f, 'w', encoding='utf-8') as fp:
                  fp.write(content)
          print(f'Cache-busted CSS/JS with v={version}')
          "

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy deploy-tmp --project-name=celson-website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge Cloudflare CDN cache
        run: |
          # Try zone-level purge (works if domain has a traditional Cloudflare zone)
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=celson.ltd" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null || echo "")
          if [ -n "$ZONE_ID" ]; then
            echo "Zone ID: $ZONE_ID"
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
            echo "Zone cache purged"
          else
            echo "No traditional zone found (domain managed via Cloudflare Pages). Cache-busting via ?v= handles this."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
